name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        # --refresh-dependencies: barcha kutubxonalarni qayta yuklaydi
        # --no-daemon: Gradle'ni yangi jarayonda ishga tushiradi
        # clean: eski fayllarni tozalaydi
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --refresh-dependencies --info

      - name: Check APK size
        run: |
          ls -lh app/build/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GreenLeaf-APK
          path: app/build/outputs/apk/debug/app-debug.apk
