name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Diagnostika uchun: Papkada nima borligini tekshiramiz
      - name: List files
        run: ls -R

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Agar gradlew bo'lmasa, bu qadam xato beradi
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || echo "gradlew topilmadi!"

      - name: Build with Gradle
        run: ./gradlew assembleDebug || echo "Build xatolik bilan tugadi!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GreenLeaf-APK
          path: app/build/outputs/apk/debug/app-debug.apk
