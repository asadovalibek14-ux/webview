name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        # --stacktrace va --info bizga nima xato bo'layotganini yozib beradi
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace --info

      # Fayl borligini tekshirish uchun qo'shimcha qadam
      - name: Verify APK existence
        run: |
          echo "Papkadagi fayllar:"
          ls -R app/build/outputs/apk/
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "APK fayl topildi!"
          else
            echo "XATO: APK fayl topilmadi!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GreenLeaf-APK
          path: app/build/outputs/apk/debug/app-debug.apk
